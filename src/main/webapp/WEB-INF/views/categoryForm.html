<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 등록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .form-box { margin-top: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"] { width: 100%; max-width: 500px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .error-text { color: #e74c3c; font-size: 0.95em; margin-top: 6px; display: block; }
        .btn { display: inline-block; padding: 8px 16px; background: #4a90d9; color: white; text-decoration: none; border: none; border-radius: 4px; cursor: pointer; margin-right: 8px; }
        .btn:hover { background: #357abd; }
        .btn-secondary { display: inline-block; padding: 8px 16px; background: #95a5a6; color: white; text-decoration: none; border-radius: 4px; }
        .btn-secondary:hover { background: #7f8c8d; }
        footer { margin-top: 30px; font-size: 13px; color: #555; }
    </style>
</head>
<body>

<h1>카테고리 등록</h1>

<div class="form-box">
    <form th:action="@{/categories/create}" th:object="${categoryForm}" method="post">
        <div class="form-group">
            <label for="name">카테고리 이름</label>
            <input type="text" id="name" th:field="*{name}" placeholder="카테고리 이름을 입력하세요">
            <span class="error-text" th:errors="*{name}"></span>
        </div>

        <button type="submit" class="btn">등록</button>
        <a th:href="@{/categories}" class="btn-secondary">목록으로</a>
    </form>
</div>

<footer>
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 HH:mm:ss') + '  |  학번: 2291087  |  성명: 양승연'}"></p>
</footer>

</body>
</html>
